<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnoza Operacyjna — Klinika</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #20243a;
    --border: #2a2d3e;
    --text: #e2e8f0;
    --muted: #8892a4;
    --blue: #4f8ef7;
    --blue-dim: #1e3a6e;
    --green: #22c55e;
    --green-dim: #14532d;
    --red: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Login ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

  .login-box input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }

  .login-box input[type="password"]:focus { border-color: var(--blue); }
  .login-box input[type="password"].error {
    border-color: var(--red);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  #login-error { color: var(--red); font-size: 13px; margin-bottom: 12px; min-height: 20px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--blue); color: #fff; width: 100%; justify-content: center; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-success { background: var(--green); color: #000; }
  .btn-success:hover { opacity: 0.88; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }

  /* ── App ── */
  #app { display: none; }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 { font-size: 16px; font-weight: 600; }
  header p { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .counter {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 13px;
    color: var(--muted);
  }

  .counter span { color: var(--green); font-weight: 600; }

  /* ── Tab bar ── */
  .tab-bar-wrap {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 90;
  }

  .tab-bar {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 20px;
  }

  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    padding: 13px 16px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-size: 13px;
    font-weight: 500;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-btn.tab-closed { color: var(--muted); }
  .tab-btn.tab-closed .tab-dot { background: var(--green); }
  .tab-btn.tab-closed.active { color: var(--green); border-bottom-color: var(--green); }

  .tab-num {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    background: var(--blue-dim);
    color: var(--blue);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .tab-btn.tab-closed .tab-num {
    background: var(--green-dim);
    color: var(--green);
  }

  /* ── Tab content ── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Content sections ── */
  .section-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .section-block.is-closed { border-color: var(--green-dim); }

  .section-label {
    padding: 11px 18px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .section-label.label-green { color: var(--green); }

  .section-body {
    padding: 18px;
    font-size: 14px;
    line-height: 1.75;
  }

  .section-body strong { color: #fff; }
  .section-body ul, .section-body ol { padding-left: 20px; margin: 8px 0; }
  .section-body li { margin-bottom: 4px; }

  /* ── Comments ── */
  .comments-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .comment-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
  }

  .comment-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .comment-author { font-weight: 600; font-size: 13px; color: var(--blue); }
  .comment-ts { font-size: 12px; color: var(--muted); }
  .comment-text { font-size: 14px; line-height: 1.6; }

  .no-comments { color: var(--muted); font-size: 13px; font-style: italic; margin-bottom: 16px; }

  .comment-form { display: flex; flex-direction: column; gap: 8px; }

  .form-row { display: flex; gap: 8px; align-items: flex-start; }

  select, input[type="text"], textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    padding: 9px 12px;
    font-family: inherit;
  }

  select:focus, input[type="text"]:focus, textarea:focus { border-color: var(--blue); }
  select { cursor: pointer; flex: 0 0 130px; }
  textarea { resize: vertical; min-height: 68px; line-height: 1.5; flex: 1; width: 100%; }

  /* ── Close section ── */
  .close-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .final-area { margin-bottom: 12px; }
  .final-area textarea { min-height: 90px; width: 100%; }

  /* ── Brief section ── */
  .brief-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
    flex-wrap: wrap;
  }

  .brief-actions { display: flex; gap: 8px; }

  .brief-text {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: #c8d3e0;
    max-height: 400px;
    overflow-y: auto;
  }

  /* ── Export Modal ── */
  #export-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #export-modal.open { display: flex; }

  .modal-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 700px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 16px; font-weight: 600; }

  .modal-box textarea {
    flex: 1;
    min-height: 300px;
    font-family: 'Courier New', monospace;
    font-size: 12.5px;
    background: var(--bg);
    resize: none;
    width: 100%;
  }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

  /* ── Saving indicator ── */
  .saving-indicator {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .saving-indicator.visible { opacity: 1; }

  @media (max-width: 600px) {
    .form-row { flex-direction: column; }
    select { flex: 1; }
    .header-right { width: 100%; justify-content: space-between; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Diagnoza Operacyjna</h1>
    <p>Klinika Medycyny Estetycznej — dostęp wewnętrzny</p>
    <input type="password" id="pwd-input" placeholder="Hasło dostępu" autocomplete="current-password">

  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-inner">

</div>

  {
    id: 'p1',
    title: 'Kalendarze',
    fullTitle: 'Chaos operacyjny kalendarzy',
    problem: `Klinika działa na dwóch równoległych systemach rezerwacji — <strong>Medfile</strong> (główny system medyczny) i <strong>Booksy</strong> (platforma dla pacjentów). Oba mają własne kalendarze, które nie są ze sobą zsynchronizowane w czasie rzeczywistym. Efekt: asystentka zapisuje pacjenta przez telefon do Medfile, a w tym samym momencie ktoś inny rezerwuje ten sam termin przez Booksy. Kolizja wychodzi na jaw dopiero przy potwierdzeniu.

Medfile synchronizuje się z Google Calendar (choć wymaga to ręcznego uruchomienia każdego ranka). Booksy — prawdopodobnie też, ale nie zostało to potwierdzone.

To jest według właściciela <strong>największy dzienny problem operacyjny</strong> kliniki.`,
    solution: `<strong>Rozwiązanie zarządcze:</strong> Ustalić jedną zasadę: Medfile jest master calendar. Booksy służy tylko do samodzielnych rezerwacji online — ale każda rezerwacja z Booksy musi natychmiast trafiać do Medfile i blokować ten czas. Asystentki nie zapisują nikogo przez telefon bez sprawdzenia Google Calendar.

<strong>Rozwiązanie techniczne — architektura hub:</strong>
<ul>
<li>Medfile → synchronizacja z Google Calendar (już istnieje, wymaga automatyzacji co godzinę)</li>
<li>Booksy → synchronizacja z Google Calendar (do weryfikacji przez API lub Zapier/Make)</li>
<li>Agent monitorujący Google Calendar co 5 minut — wykrywa kolizje i wysyła alert na Telegram</li>
</ul>

Jeśli Booksy nie udostępnia API — można użyć webhooków Booksy lub parsować potwierdzenia mailowe z Google Workspace.

<strong>Narzędzia:</strong> n8n (self-hosted), Google Calendar API, Make.com jako backup`
  },
  {
    id: 'p2',
    title: 'Komunikacja',
    fullTitle: 'Komunikacja wewnętrzna bez systemu',
    problem: `Zadania są przekazywane ustnie — między gabinetem a recepcją, w biegu, między jednym pacjentem a drugim. Nie ma narzędzia do śledzenia, co zostało zlecone i co zostało wykonane. Komunikator grupowy (Signal) jest jeden dla całej rejestracji — wiadomości giną w strumieniu.

Efekt: zadania "wypadają" — szczególnie nieregularne, jednorazowe, zlecone głosem. Zamówienia zaopatrzenia wychodzą za późno. Kontakty z pacjentami są zapominane. Właściciel odczuwa to jako brak niezawodności zespołu, choć źródłem problemu jest brak systemu.`,
    solution: `<strong>Rozwiązanie zarządcze:</strong> Każde ustne polecenie musi być zamienione na zadanie w Asanie w ciągu 2 minut. Obowiązek leży po stronie osoby przyjmującej zadanie. Każda asystentka, zaczynając zmianę, otwiera Asanę i sprawdza swoje zadania.

<strong>Rozwiązanie techniczne — agent konwersacyjny (już zbudowany):</strong>
<ul>

<li>Agent przetwarza wiadomość głosową → tworzy zadanie w Asanie z tytułem, opisem, przypisaniem, deadlinem</li>
<li>Asystentka dostaje powiadomienie na Telegramie</li>
<li>Po wykonaniu: odpisuje "zrobione" → agent zamyka zadanie w Asanie</li>
</ul>

<strong>Agent Asana monitoring:</strong> Codziennie o 8:00 wysyła każdej asystentce jej listę zadań. O 18:00 wysyła właścicielowi raport: co zrobiono, co nie.

<strong>Narzędzia:</strong> Agent konwersacyjny (już zbudowany) + Asana MCP (już zbudowany), n8n, Telegram Bot API`
  },
  {
    id: 'p3',
    title: 'Opinie',
    fullTitle: 'Zbieranie opinii — nieregularne i nieskuteczne',
    problem: `Klinika ma <strong>840 opinii 5.0</strong> łącznie na Google Business Profile, Booksy i Znany Lekarz. To mocny aktyw. Ale opinie zbierane są nieregularnie — zależy od tego, czy asystentka zapyta. Na Booksy algorytm wyszukiwania premiuje kliniki zbierające opinie <strong>kilka razy w tygodniu</strong> — przy obecnym tempie klinika traci widoczność i nowych pacjentów.

Nie ma systematycznego follow-upu po wizycie z zapytaniem o samopoczucie — a to byłby naturalny punkt wejścia do prośby o opinię.`,
    solution: `<strong>Rozwiązanie zarządcze:</strong> Podpiąć część premii asystentek pod liczbę zebranych opinii tygodniowo. Cel: minimum 3 opinie tygodniowo per lokalizacja na Booksy.

<strong>Rozwiązanie techniczne — automatyczny follow-up po wizycie:</strong>
<ul>
<li><strong>24h po wizycie:</strong> SMS/WhatsApp z pytaniem "Jak się Pani/Pan czuje po zabiegu?" — wysłany automatycznie na podstawie danych z Medfile</li>
<li><strong>48h po wizycie:</strong> jeśli pacjent odpowiedział pozytywnie (lub nie odpowiedział) → SMS z linkiem do opinii na Google/Booksy/Znany Lekarz</li>
<li><strong>Odpowiedź negatywna:</strong> zamiast prośby o opinię → zadanie dla asystentki: "Oddzwoń do Pani X — niezadowolona"</li>
</ul>

Dashboard HTML: właściciel widzi tygodniową liczbę opinii per platforma, trend miesięczny, alerty.

<strong>Narzędzia:</strong> n8n, Medfile API/eksport, SMS przez T-Mobile API lub WhatsApp Business API`

    id: 'p4',

Klinika ma 840 opinii tekstowych, które mogłyby służyć jako kontent — i nikt z tego nie korzysta.`,
    solution: `<strong>Rozwiązanie zarządcze:</strong> Rozdzielić dwa problemy: (1) produkcja treści — wymaga właściciela; (2) publikacja treści — może być w pełni zautomatyzowana. Rytm: 3 posty tygodniowo. Zanim będzie gotowy materiał wideo, kontent z opinii.

<strong>Agent do contentu z opinii:</strong>
<ul>
<li>Co tydzień agent wybiera 3 najlepsze opinie z Booksy/Google</li>

<li>Po zatwierdzeniu — automatycznie publikuje na Instagramie i Facebooku przez Meta API</li>

<strong>Pipeline dla istniejących filmów:</strong> ElevenLabs klonuje głos właściciela (próbka 30–60 min) → agent generuje voice-over ze skryptu → gotowy film trafia do Drive → zatwierdzenie → publikacja.

<strong>Narzędzia:</strong> n8n, Meta Graph API, GPT-4 Vision, ElevenLabs, Google Drive, Telegram Bot`

    solution: `<strong>Rozwiązanie techniczne — agent raportowy (co poniedziałek rano):</strong>

  },
  {

    fullTitle: 'Retencja pacjentów — churn detection',
    problem: `Medfile zawiera pełną historię wizyt per pacjent, etykiety usług i cennik. Te dane pozwalają zidentyfikować pacjentów, którzy regularnie przyjeżdżali i nagle zniknęli. Nikt tego nie analizuje. Nie ma żadnego procesu odzyskiwania takich pacjentów.`,
    solution: `<strong>Rozwiązanie techniczne — agent analizujący dane z Medfile:</strong>
<ul>
<li>Identyfikuje pacjentów aktywnych (min. 2 wizyty w 12 mies.) którzy nie wrócili od 90+ dni</li>
<li>Segmentuje według: zabiegu, wartości (łączne wydatki), ostatniej wizyty</li>
<li>Tworzy listę w Asanie: "Pacjenci do reaktywacji — ten tydzień"</li>
<li>Opcjonalnie: agent wysyła personalizowaną wiadomość SMS/WhatsApp: "Minęło trochę czasu od ostatniej wizyty…"</li>
</ul>

<strong>Wymaganie wstępne:</strong> jednorazowe przygotowanie eksportu z Medfile i ustalenie logiki segmentacji (jakie zabiegi, jakie progi czasowe).

<strong>Narzędzia:</strong> n8n, Medfile eksport/API, Python (analiza danych), Asana, SMS API`
  }
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let state = {};
let activeTab = 'p1';

function emptyState() {
  const s = {};
  PROBLEMS.forEach(p => { s[p.id] = { comments: [], closed: false, finalComment: '' }; });
  return s;
}

// ═══════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function login() {
  const input = document.getElementById('pwd-input');
  const errorEl = document.getElementById('login-error');
  const val = input.value.trim();
  if (!val) return;
  if (!CONFIG.PASSWORD_HASH) { proceedToApp(); return; }
  const hash = await sha256hex(val);
  if (hash === CONFIG.PASSWORD_HASH) {
    sessionStorage.setItem('auth', '1');
    proceedToApp();
  } else {
    errorEl.textContent = 'Nieprawidłowe hasło';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 500);
  }
}

function proceedToApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

// ═══════════════════════════════════════════════════════
//  JSONBIN API
// ═══════════════════════════════════════════════════════
const JSONBIN_BASE = 'https://api.jsonbin.io/v3/b';

async function loadData() {
  if (!CONFIG.JSONBIN_BIN_ID) {
    const saved = localStorage.getItem('gabinet-diagnoza');
    state = saved ? JSON.parse(saved) : emptyState();
    renderAll();
    return;
  }
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (CONFIG.JSONBIN_ACCESS_KEY) headers['X-Access-Key'] = CONFIG.JSONBIN_ACCESS_KEY;
    else if (CONFIG.JSONBIN_MASTER_KEY) headers['X-Master-Key'] = CONFIG.JSONBIN_MASTER_KEY;
    const res = await fetch(`${JSONBIN_BASE}/${CONFIG.JSONBIN_BIN_ID}/latest`, { headers });
    const json = await res.json();
    state = json.record && json.record.p1 ? json.record : emptyState();
  } catch (e) {
    console.warn('JSONBin load failed, falling back to localStorage', e);
    const saved = localStorage.getItem('gabinet-diagnoza');
    state = saved ? JSON.parse(saved) : emptyState();
  }
  renderAll();
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistData, 800);
}

async function persistData() {
  showSaving();
  localStorage.setItem('gabinet-diagnoza', JSON.stringify(state));
  if (!CONFIG.JSONBIN_BIN_ID || !CONFIG.JSONBIN_MASTER_KEY) { hideSaving(); return; }
  try {
    await fetch(`${JSONBIN_BASE}/${CONFIG.JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.JSONBIN_MASTER_KEY },
      body: JSON.stringify(state)
    });
  } catch (e) { console.warn('JSONBin save failed', e); }
  hideSaving();
}

function showSaving() { document.getElementById('saving-indicator').classList.add('visible'); }
function hideSaving() { setTimeout(() => document.getElementById('saving-indicator').classList.remove('visible'), 600); }

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function renderAll() {
  renderTabBar();
  renderTabContent();
  updateCounter();
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = PROBLEMS.map((p, i) => {
    const ps = state[p.id] || {};
    const closedClass = ps.closed ? 'tab-closed' : '';
    const activeClass = p.id === activeTab ? 'active' : '';
    return `<button class="tab-btn ${closedClass} ${activeClass}" onclick="switchTab('${p.id}')">
      <span class="tab-num">${i + 1}</span>${p.title}
    </button>`;
  }).join('');
}

function renderTabContent() {
  const container = document.getElementById('tab-content');
  container.innerHTML = PROBLEMS.map(p => `
    <div class="tab-panel ${p.id === activeTab ? 'active' : ''}" id="panel-${p.id}">
      ${renderPanel(p)}
    </div>`).join('');
}

function renderPanel(p) {
  const ps = state[p.id] || { comments: [], closed: false, finalComment: '' };

  const commentsHtml = ps.comments.length === 0
    ? '<p class="no-comments">Brak komentarzy.</p>'
    : ps.comments.map(c => `
        <div class="comment-item">
          <div class="comment-meta">
            <span class="comment-author">${esc(c.author)}</span>
            <span class="comment-ts">${formatTs(c.ts)}</span>
          </div>
          <div class="comment-text">${esc(c.text)}</div>
        </div>`).join('');

  const commentForm = ps.closed ? '' : `
    <div class="comment-form">
      <div class="form-row">
        <select id="author-${p.id}">
          <option value="">— Wybierz osobę —</option>
          <option value="Hipek">Hipek</option>
          <option value="Kuba">Kuba</option>
        </select>
        <textarea id="text-${p.id}" placeholder="Twój komentarz…"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="addComment('${p.id}')">Dodaj komentarz</button>
      </div>
    </div>`;

  const closeBlock = ps.closed ? '' : `
    <div class="section-block">
      <div class="section-label">Zamknij plan</div>
      <div class="section-body">
        <div class="final-area">
          <textarea
            id="final-${p.id}"
            placeholder="Opisz konkretnie, co agent ma automatyzować w tym rozwiązaniu — to będzie podstawą briefu dla Claude Code…"
            oninput="updateFinalComment('${p.id}', this.value)"
          >${esc(ps.finalComment)}</textarea>
        </div>
        <button class="btn btn-success btn-sm" onclick="closePlan('${p.id}')">
          ✓ Zamknij plan i wygeneruj brief
        </button>
      </div>
    </div>`;

  const briefBlock = ps.closed ? `
    <div class="section-block is-closed">
      <div class="section-label label-green">Brief dla Claude Code</div>
      <div class="section-body">
        <div class="brief-header">
          <div class="brief-actions">
            <button class="btn btn-ghost btn-sm" onclick="reopenPlan('${p.id}')">↩ Otwórz ponownie</button>
            <button class="btn btn-ghost btn-sm" onclick="copyBrief('${p.id}')">Kopiuj brief</button>
          </div>
        </div>
        <div class="brief-text" id="brief-${p.id}">${esc(generateBrief(p.id))}</div>
      </div>
    </div>` : '';

  return `
    <div style="margin-bottom:6px">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">${esc(p.fullTitle)}</h2>
    </div>

    <div class="section-block">
      <div class="section-label">Problem</div>
      <div class="section-body">${p.problem}</div>
    </div>

    <div class="section-block">
      <div class="section-label">Rozwiązanie</div>
      <div class="section-body">${p.solution}</div>
    </div>

    <div class="section-block">
      <div class="section-label">Komentarze zespołu</div>
      <div class="section-body">
        <div class="comments-list">${commentsHtml}</div>
        ${commentForm}
      </div>
    </div>

    ${closeBlock}
    ${briefBlock}`;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatTs(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' })
    + ' ' + d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
}

// ═══════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════
function switchTab(id) {
  activeTab = id;
  renderTabBar();
  PROBLEMS.forEach(p => {
    const panel = document.getElementById('panel-' + p.id);
    if (panel) panel.classList.toggle('active', p.id === id);
  });
}

function updateFinalComment(id, val) {
  state[id].finalComment = val;
  scheduleSave();
}

function addComment(id) {
  const authorEl = document.getElementById('author-' + id);
  const textEl = document.getElementById('text-' + id);
  const author = authorEl.value;
  const text = textEl.value.trim();
  if (!author || !text) {
    if (!author) authorEl.style.borderColor = 'var(--red)';
    if (!text) textEl.style.borderColor = 'var(--red)';
    setTimeout(() => { authorEl.style.borderColor = ''; textEl.style.borderColor = ''; }, 1200);
    return;
  }
  state[id].comments.push({ author, text, ts: new Date().toISOString() });
  authorEl.value = '';
  textEl.value = '';
  refreshPanel(id);
  scheduleSave();
}

function closePlan(id) {
  const finalEl = document.getElementById('final-' + id);
  const final = finalEl ? finalEl.value.trim() : state[id].finalComment;
  if (!final) {
    if (finalEl) {
      finalEl.style.borderColor = 'var(--red)';
      finalEl.placeholder = 'Wymagane! Opisz fokus automatyzacji przed zamknięciem.';
      setTimeout(() => { finalEl.style.borderColor = ''; }, 1500);
    }
    return;
  }
  state[id].finalComment = final;
  state[id].closed = true;
  state[id].closedAt = new Date().toISOString();
  refreshPanel(id);
  updateCounter();
  scheduleSave();
}

function reopenPlan(id) {
  state[id].closed = false;
  state[id].closedAt = null;
  refreshPanel(id);
  updateCounter();
  scheduleSave();
}

function refreshPanel(id) {
  const panel = document.getElementById('panel-' + id);
  if (!panel) return;
  const p = PROBLEMS.find(x => x.id === id);
  panel.innerHTML = renderPanel(p);
  renderTabBar();
}

function updateCounter() {
  const count = PROBLEMS.filter(p => state[p.id] && state[p.id].closed).length;
  document.getElementById('closed-count').textContent = count;
  const btn = document.getElementById('export-btn');
  if (btn) btn.style.display = count > 0 ? '' : 'none';
}

// ═══════════════════════════════════════════════════════
//  BRIEF GENERATION
// ═══════════════════════════════════════════════════════
function stripHtml(html) {
  return html
    .replace(/<strong>/gi, '**').replace(/<\/strong>/gi, '**')
    .replace(/<ul>/gi, '').replace(/<\/ul>/gi, '')
    .replace(/<li>/gi, '- ').replace(/<\/li>/gi, '\n')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<[^>]+>/g, '')
    .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"')
    .replace(/\n{3,}/g, '\n\n').trim();
}

function generateBrief(id) {
  const p = PROBLEMS.find(x => x.id === id);
  const ps = state[id];
  if (!p || !ps) return '';
  const commentsText = ps.comments.length > 0
    ? ps.comments.map(c => `- ${c.author} (${formatTs(c.ts)}): ${c.text}`).join('\n')
    : '(brak komentarzy)';
  return `# Brief dla Claude Code: ${p.fullTitle}

## Problem operacyjny
${stripHtml(p.problem)}

## Proponowane rozwiązanie
${stripHtml(p.solution)}

## Komentarze zespołu
${commentsText}

## Fokus automatyzacji
${ps.finalComment}

## Zadanie dla Claude Code
Stwórz automatyzację zgodnie z powyższym rozwiązaniem, skupiając się na: ${ps.finalComment}

Używaj narzędzi i integracji wymienionych w sekcji rozwiązania. Wygeneruj gotowy kod/konfigurację workflow, który można wdrożyć bez dodatkowej konfiguracji. Priorytetyzuj to, co zostało wskazane w fokusie automatyzacji powyżej.`;
}

function copyBrief(id) {
  navigator.clipboard.writeText(generateBrief(id)).then(() => {
    const btn = document.querySelector(`#panel-${id} .brief-actions .btn:last-child`);
    if (btn) { btn.textContent = '✓ Skopiowano'; setTimeout(() => btn.textContent = 'Kopiuj brief', 1500); }
  });
}

// ═══════════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════════
function openExport() {
  const closed = PROBLEMS.filter(p => state[p.id] && state[p.id].closed);
  document.getElementById('export-textarea').value = closed.map(p => generateBrief(p.id)).join('\n\n' + '═'.repeat(60) + '\n\n');
  document.getElementById('export-modal').classList.add('open');
}

function closeExport() { document.getElementById('export-modal').classList.remove('open'); }

function copyExport() {
  const ta = document.getElementById('export-textarea');
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.querySelector('.modal-footer .btn');
    if (btn) { btn.textContent = '✓ Skopiowano!'; setTimeout(() => btn.textContent = 'Kopiuj wszystko', 1500); }
  });
}

// ═══════════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
  if (e.key === 'Escape') closeExport();
});

// ═══════════════════════════════════════════════════════
//  AUTO-LOGIN
// ═══════════════════════════════════════════════════════
if (sessionStorage.getItem('auth') === '1' || !CONFIG.PASSWORD_HASH) {
  proceedToApp();
}
</script>
</body>
</html>
