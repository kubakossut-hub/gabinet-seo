<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnoza Operacyjna — Klinika</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #20243a;
    --border: #2a2d3e;
    --text: #e2e8f0;
    --muted: #8892a4;
    --blue: #4f8ef7;
    --blue-dim: #1e3a6e;
    --green: #22c55e;
    --green-dim: #14532d;
    --red: #ef4444;
    --orange: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

  /* ── Login ── */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
  .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .login-box input[type="password"] { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; margin-bottom: 12px; }
  .login-box input[type="password"]:focus { border-color: var(--blue); }
  .login-box input[type="password"].error { border-color: var(--red); animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  #login-error { color: var(--red); font-size: 13px; margin-bottom: 12px; min-height: 20px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--blue); color: #fff; width: 100%; justify-content: center; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-success { background: var(--green); color: #000; }
  .btn-success:hover { opacity: 0.88; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }

  /* ── App / Header ── */
  #app { display: none; }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 980px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 15px; font-weight: 600; }
  header p { color: var(--muted); font-size: 12px; margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .counter { background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; font-size: 13px; color: var(--muted); }
  .counter span { color: var(--green); font-weight: 600; }

  /* ── Tab bar ── */
  .tab-bar-wrap { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 53px; z-index: 90; }
  .tab-bar { max-width: 980px; margin: 0 auto; display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 16px; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 12px 14px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; font-size: 13px; font-weight: 500; transition: color 0.15s, border-color 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 7px; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-btn.tab-info.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab-btn.tab-problems.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-btn.tab-closed.active { color: var(--green); border-bottom-color: var(--green); }
  /* Sub-bar for problems */
  .tab-bar-sub-wrap { background: var(--bg); border-bottom: 1px solid var(--border); display: none; }
  .tab-bar-sub-wrap.visible { display: block; }
  .tab-btn.tab-sub { font-size: 12px; padding: 8px 11px; gap: 6px; }
  .tab-btn.tab-sub.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-btn.tab-sub.tab-closed.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-num { width: 18px; height: 18px; border-radius: 4px; background: var(--blue-dim); color: var(--blue); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tab-btn.tab-closed .tab-num { background: var(--green-dim); color: var(--green); }

  /* ── Tab content ── */
  main { max-width: 980px; margin: 0 auto; padding: 24px 20px 80px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Content blocks ── */
  .section-block { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .section-block.is-closed { border-color: var(--green-dim); }
  .section-label { padding: 10px 18px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
  .section-label.label-green { color: var(--green); }
  .section-label.label-orange { color: var(--orange); }
  .section-body { padding: 18px; font-size: 14px; line-height: 1.75; }
  .section-body strong { color: #fff; }
  .section-body h3 { font-size: 15px; font-weight: 600; margin: 16px 0 8px; color: #fff; }
  .section-body h3:first-child { margin-top: 0; }
  .section-body p { margin-bottom: 10px; }
  .section-body p:last-child { margin-bottom: 0; }
  .section-body ul, .section-body ol { padding-left: 20px; margin: 8px 0; }
  .section-body li { margin-bottom: 4px; }

  /* ── Flow / code blocks ── */
  .flow-block { background: #0a0d15; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: 'Courier New', monospace; font-size: 12.5px; line-height: 1.8; white-space: pre; overflow-x: auto; color: #9bb8cc; margin: 12px 0; }
  .flow-block:last-child { margin-bottom: 0; }

  /* ── Tables ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { background: var(--card2); color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.06em; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table td:first-child { font-weight: 600; color: var(--blue); white-space: nowrap; }
  .badge-diff { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .diff-low { background: var(--green-dim); color: var(--green); }
  .diff-mid { background: #1a2e00; color: #84cc16; }
  .diff-high { background: #2d1a00; color: var(--orange); }

  /* ── Comments ── */
  .comments-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .comment-item { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; }
  .comment-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .comment-author { font-weight: 600; font-size: 13px; color: var(--blue); }
  .comment-ts { font-size: 12px; color: var(--muted); }
  .comment-text { font-size: 14px; line-height: 1.6; }
  .no-comments { color: var(--muted); font-size: 13px; font-style: italic; margin-bottom: 16px; }
  .comment-form { display: flex; flex-direction: column; gap: 8px; }
  .form-row { display: flex; gap: 8px; align-items: flex-start; }

  /* ── Form controls ── */
  select, input[type="text"], textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; padding: 9px 12px; font-family: inherit; }
  select:focus, input[type="text"]:focus, textarea:focus { border-color: var(--blue); }
  select { cursor: pointer; flex: 0 0 130px; }
  textarea { resize: vertical; min-height: 68px; line-height: 1.5; flex: 1; width: 100%; }
  .final-area { margin-bottom: 12px; }
  .final-area textarea { min-height: 90px; width: 100%; }

  /* ── Brief textarea ── */
  .brief-text { background: #0a0d15; border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: 'Courier New', monospace; font-size: 12.5px; line-height: 1.75; color: #b8cfe0; width: 100%; min-height: 280px; resize: vertical; }
  .brief-text:focus { border-color: var(--green); }
  .brief-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .brief-note { font-size: 12px; color: var(--muted); }
  .brief-actions { display: flex; gap: 8px; }

  /* ── Export modal ── */
  #export-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  #export-modal.open { display: flex; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 720px; max-height: 85vh; display: flex; flex-direction: column; gap: 14px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 16px; font-weight: 600; }
  .modal-box textarea { flex: 1; min-height: 300px; font-family: 'Courier New', monospace; font-size: 12.5px; background: var(--bg); resize: none; width: 100%; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

  /* ── Saving indicator ── */
  .saving-indicator { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; color: var(--muted); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .saving-indicator.visible { opacity: 1; }

  @media (max-width: 600px) {
    .form-row { flex-direction: column; }
    select { flex: 1; }
    .header-right { width: 100%; justify-content: space-between; }
  }
</style>
</head>

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function login() {
  const input = document.getElementById('pwd-input');
  const errorEl = document.getElementById('login-error');
  const val = input.value.trim();
  if (!val) return;
  if (!CONFIG.PASSWORD_HASH) { proceedToApp(); return; }
  const hash = await sha256hex(val);
  if (hash === CONFIG.PASSWORD_HASH) {
    sessionStorage.setItem('auth', '1');
    proceedToApp();
  } else {
    errorEl.textContent = 'Nieprawidłowe hasło';
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 500);
  }
}

function proceedToApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

    if (CONFIG.JSONBIN_ACCESS_KEY) headers['X-Access-Key'] = CONFIG.JSONBIN_ACCESS_KEY;
    else if (CONFIG.JSONBIN_MASTER_KEY) headers['X-Master-Key'] = CONFIG.JSONBIN_MASTER_KEY;
    const res = await fetch(`${JSONBIN_BASE}/${CONFIG.JSONBIN_BIN_ID}/latest`, { headers });
    const json = await res.json();
    state = json.record && json.record.p1 ? json.record : emptyState();
    migrateMissingKeys();
  } catch (e) {
    console.warn('JSONBin load failed, falling back to localStorage', e);
    const saved = localStorage.getItem('gabinet-diagnoza');
    state = saved ? JSON.parse(saved) : emptyState();
    migrateMissingKeys();
  }
  renderAll();
}

function migrateMissingKeys() {
  PROBLEMS.forEach(p => {
    if (!state[p.id]) state[p.id] = { comments: [], closed: false, finalComment: '', briefText: '' };
    if (!state[p.id].briefText) state[p.id].briefText = '';
  });
  INFO_TABS.forEach(t => {
    if (!state[t.id]) state[t.id] = { comments: [] };
  });
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistData, 800);
}

async function persistData() {
  showSaving();
  localStorage.setItem('gabinet-diagnoza', JSON.stringify(state));
  if (!CONFIG.JSONBIN_BIN_ID || !CONFIG.JSONBIN_MASTER_KEY) { hideSaving(); return; }
  try {
    await fetch(`${JSONBIN_BASE}/${CONFIG.JSONBIN_BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.JSONBIN_MASTER_KEY },
      body: JSON.stringify(state)
    });
  } catch (e) { console.warn('JSONBin save failed', e); }
  hideSaving();
}

function showSaving() { document.getElementById('saving-indicator').classList.add('visible'); }
function hideSaving() { setTimeout(() => document.getElementById('saving-indicator').classList.remove('visible'), 600); }

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function renderAll() {
  renderTabBar();
  renderTabContent();
  updateCounter();
}

function renderTabBar() {
  const problemsActive = isProblemTab(activeTab);

  // Top bar: info tabs + Problemy button
  const topBar = document.getElementById('tab-bar-top');
  topBar.innerHTML = INFO_TABS.map(t =>
    `<button class="tab-btn tab-info ${t.id === activeTab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.title}</button>`
  ).join('') +
  `<button class="tab-btn tab-problems ${problemsActive ? 'active' : ''}" onclick="switchToProblems()">Problemy ▾</button>`;

  // Sub bar: 8 problem tabs, visible only when a problem is active
  const subWrap = document.getElementById('tab-bar-sub-wrap');
  const subBar = document.getElementById('tab-bar-sub');
  if (problemsActive) {
    subWrap.classList.add('visible');
    subBar.innerHTML = PROBLEMS.map((p, i) => {
      const ps = state[p.id] || {};
      const closedClass = ps.closed ? 'tab-closed' : '';
      return `<button class="tab-btn tab-sub ${closedClass} ${p.id === activeTab ? 'active' : ''}" onclick="switchTab('${p.id}')">
        <span class="tab-num">${i + 1}</span>${p.title}
      </button>`;
    }).join('');
  } else {
    subWrap.classList.remove('visible');
  }
}

function switchToProblems() {
  switchTab(lastActiveProblem);
}

function renderInfoPanel(t) {
  const ts = state[t.id] || { comments: [] };
  const commentsHtml = ts.comments.length === 0
    ? '<p class="no-comments">Brak komentarzy.</p>'
    : ts.comments.map(c => `
        <div class="comment-item">
          <div class="comment-meta">
            <span class="comment-author">${esc(c.author)}</span>
            <span class="comment-ts">${formatTs(c.ts)}</span>
          </div>
          <div class="comment-text">${esc(c.text)}</div>
        </div>`).join('');
  return t.html + `
    <div class="section-block">
      <div class="section-label">Komentarze zespołu</div>
      <div class="section-body">
        <div class="comments-list">${commentsHtml}</div>
        <div class="comment-form">
          <div class="form-row">
            <select id="author-${t.id}">
              <option value="">— Wybierz osobę —</option>
              <option value="Hipek">Hipek</option>
              <option value="Kuba">Kuba</option>
            </select>
            <textarea id="text-${t.id}" placeholder="Twój komentarz…"></textarea>
          </div>
          <div style="display:flex;justify-content:flex-end">
            <button class="btn btn-ghost btn-sm" onclick="addComment('${t.id}')">Dodaj komentarz</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderTabContent() {
  const container = document.getElementById('tab-content');
  const infoPanels = INFO_TABS.map(t =>
    `<div class="tab-panel ${t.id === activeTab ? 'active' : ''}" id="panel-${t.id}">${renderInfoPanel(t)}</div>`
  ).join('');
  const probPanels = PROBLEMS.map(p =>
    `<div class="tab-panel ${p.id === activeTab ? 'active' : ''}" id="panel-${p.id}">${renderPanel(p)}</div>`
  ).join('');
  container.innerHTML = infoPanels + probPanels;
}

function renderPanel(p) {
  const ps = state[p.id] || { comments: [], closed: false, finalComment: '', briefText: '' };

  const commentsHtml = ps.comments.length === 0
    ? '<p class="no-comments">Brak komentarzy.</p>'
    : ps.comments.map(c => `
        <div class="comment-item">
          <div class="comment-meta">
            <span class="comment-author">${esc(c.author)}</span>
            <span class="comment-ts">${formatTs(c.ts)}</span>
          </div>
          <div class="comment-text">${esc(c.text)}</div>
        </div>`).join('');

  const commentForm = ps.closed ? '' : `
    <div class="comment-form">
      <div class="form-row">
        <select id="author-${p.id}">
          <option value="">— Wybierz osobę —</option>
          <option value="Hipek">Hipek</option>
          <option value="Kuba">Kuba</option>
        </select>
        <textarea id="text-${p.id}" placeholder="Twój komentarz…"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="addComment('${p.id}')">Dodaj komentarz</button>
      </div>
    </div>`;

  const closeBlock = ps.closed ? '' : `
    <div class="section-block">
      <div class="section-label">Zamknij plan</div>
      <div class="section-body">
        <div class="final-area">
          <textarea id="final-${p.id}"
            placeholder="Opisz konkretnie, co agent ma automatyzować w tym rozwiązaniu — to będzie podstawą briefu dla Claude Code…"
            oninput="updateFinalComment('${p.id}', this.value)"
          >${esc(ps.finalComment)}</textarea>
        </div>
        <button class="btn btn-success btn-sm" onclick="closePlan('${p.id}')">
          ✓ Zamknij plan i wygeneruj brief
        </button>
      </div>
    </div>`;

  const briefContent = ps.briefText || generateBrief(p.id);
  const briefBlock = ps.closed ? `
    <div class="section-block is-closed">
      <div class="section-label label-green">Brief dla Claude Code</div>
      <div class="section-body">
        <div class="brief-header">
          <span class="brief-note">Edytowalny — zmiany zapisują się automatycznie</span>
          <div class="brief-actions">
            <button class="btn btn-ghost btn-sm" onclick="reopenPlan('${p.id}')">↩ Otwórz ponownie</button>
            <button class="btn btn-ghost btn-sm" onclick="copyBrief('${p.id}')">Kopiuj brief</button>
          </div>
        </div>
        <textarea class="brief-text" id="brief-${p.id}"
          oninput="updateBriefText('${p.id}', this.value)"
        >${esc(briefContent)}</textarea>
      </div>
    </div>` : '';

  return `
    <div style="margin-bottom:14px">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:3px">${esc(p.fullTitle)}</h2>
    </div>
    <div class="section-block">
      <div class="section-label">Problem</div>
      <div class="section-body">${p.problem}</div>
    </div>
    <div class="section-block">
      <div class="section-label">Rozwiązanie</div>
      <div class="section-body">${p.solution}</div>
    </div>
    <div class="section-block">
      <div class="section-label">Komentarze zespołu</div>
      <div class="section-body">
        <div class="comments-list">${commentsHtml}</div>
        ${commentForm}
      </div>
    </div>
    ${closeBlock}
    ${briefBlock}`;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTs(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('pl-PL', {day:'2-digit',month:'2-digit',year:'numeric'})
    + ' ' + d.toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'});
}

// ═══════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════
function switchTab(id) {
  activeTab = id;
  if (isProblemTab(id)) lastActiveProblem = id;
  renderTabBar();
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + id);
  });
}

function updateFinalComment(id, val) { state[id].finalComment = val; scheduleSave(); }

function updateBriefText(id, val) { state[id].briefText = val; scheduleSave(); }

function addComment(id) {
  const authorEl = document.getElementById('author-' + id);
  const textEl = document.getElementById('text-' + id);
  const author = authorEl.value;
  const text = textEl.value.trim();
  if (!author || !text) {
    if (!author) authorEl.style.borderColor = 'var(--red)';
    if (!text) textEl.style.borderColor = 'var(--red)';
    setTimeout(() => { authorEl.style.borderColor = ''; textEl.style.borderColor = ''; }, 1200);
    return;
  }
  state[id].comments.push({ author, text, ts: new Date().toISOString() });
  authorEl.value = '';
  textEl.value = '';
  refreshPanel(id);
  scheduleSave();
}

function closePlan(id) {
  const finalEl = document.getElementById('final-' + id);
  const final = finalEl ? finalEl.value.trim() : state[id].finalComment;
  if (!final) {
    if (finalEl) {
      finalEl.style.borderColor = 'var(--red)';
      finalEl.placeholder = 'Wymagane! Opisz fokus automatyzacji przed zamknięciem.';
      setTimeout(() => { finalEl.style.borderColor = ''; }, 1500);
    }
    return;
  }
  state[id].finalComment = final;
  state[id].briefText = generateBrief(id);
  state[id].closed = true;
  state[id].closedAt = new Date().toISOString();
  refreshPanel(id);
  updateCounter();
  scheduleSave();
}

function reopenPlan(id) {
  state[id].closed = false;
  state[id].closedAt = null;
  refreshPanel(id);
  updateCounter();
  scheduleSave();
}

function refreshPanel(id) {
  const panel = document.getElementById('panel-' + id);
  if (!panel) return;
  const infoTab = INFO_TABS.find(t => t.id === id);
  if (infoTab) {
    panel.innerHTML = renderInfoPanel(infoTab);
  } else {
    const p = PROBLEMS.find(x => x.id === id);
    panel.innerHTML = renderPanel(p);
    renderTabBar();
  }
}

function updateCounter() {
  const count = PROBLEMS.filter(p => state[p.id] && state[p.id].closed).length;
  document.getElementById('closed-count').textContent = count;
  const btn = document.getElementById('export-btn');
  if (btn) btn.style.display = count > 0 ? '' : 'none';
}

// ═══════════════════════════════════════════════════════
//  BRIEF GENERATION
// ═══════════════════════════════════════════════════════
function stripHtml(html) {
  return html
    .replace(/<strong>/gi,'**').replace(/<\/strong>/gi,'**')
    .replace(/<ul>/gi,'').replace(/<\/ul>/gi,'')
    .replace(/<li>/gi,'- ').replace(/<\/li>/gi,'\n')
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/<pre[^>]*>/gi,'').replace(/<\/pre>/gi,'')
    .replace(/<table[^>]*>[\s\S]*?<\/table>/gi,'[tabela — patrz sekcja Rozwiązanie]')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')
    .replace(/\n{3,}/g,'\n\n').trim();
}

function generateBrief(id) {
  const p = PROBLEMS.find(x => x.id === id);
  const ps = state[id];
  if (!p || !ps) return '';
  const commentsText = ps.comments.length > 0
    ? ps.comments.map(c => `- ${c.author} (${formatTs(c.ts)}): ${c.text}`).join('\n')
    : '(brak komentarzy)';
  return `# Brief dla Claude Code: ${p.fullTitle}

## Problem operacyjny
${stripHtml(p.problem)}

## Proponowane rozwiązanie
${stripHtml(p.solution)}

## Komentarze zespołu
${commentsText}

## Fokus automatyzacji
${ps.finalComment}

## Zadanie dla Claude Code
Stwórz automatyzację zgodnie z powyższym rozwiązaniem, skupiając się na: ${ps.finalComment}

Używaj narzędzi i integracji wymienionych w sekcji rozwiązania. Wygeneruj gotowy kod/konfigurację workflow, który można wdrożyć bez dodatkowej konfiguracji. Priorytetyzuj to, co zostało wskazane w fokusie automatyzacji powyżej.`;
}

function copyBrief(id) {
  const ta = document.getElementById('brief-' + id);
  const text = ta ? ta.value : generateBrief(id);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(`#panel-${id} .brief-actions .btn:last-child`);
    if (btn) { btn.textContent = '✓ Skopiowano'; setTimeout(() => btn.textContent = 'Kopiuj brief', 1500); }
  });
}

// ═══════════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════════
function openExport() {
  const closed = PROBLEMS.filter(p => state[p.id] && state[p.id].closed);
  const text = closed.map(p => state[p.id].briefText || generateBrief(p.id)).join('\n\n' + '═'.repeat(60) + '\n\n');
  document.getElementById('export-textarea').value = text;
  document.getElementById('export-modal').classList.add('open');
}

function closeExport() { document.getElementById('export-modal').classList.remove('open'); }

function copyExport() {
  const ta = document.getElementById('export-textarea');
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.querySelector('.modal-footer .btn');
    if (btn) { btn.textContent = '✓ Skopiowano!'; setTimeout(() => btn.textContent = 'Kopiuj wszystko', 1500); }
  });
}

// ═══════════════════════════════════════════════════════
//  KEYBOARD + AUTO-LOGIN
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
  if (e.key === 'Escape') closeExport();
});

if (sessionStorage.getItem('auth') === '1' || !CONFIG.PASSWORD_HASH) {
  proceedToApp();
}
</script>
</body>
</html>
