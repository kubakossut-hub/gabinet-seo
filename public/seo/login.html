<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Dashboard — Logowanie</title>
  <link rel="stylesheet" href="/seo/static/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">📊</div>
      <h1>SEO Dashboard</h1>
      <p>Gabinet Medycyny Estetycznej</p>
    </div>

    <div id="error" class="error-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Login</label>
        <input type="text" id="username" name="username"
               placeholder="Twój login" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Hasło</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn"
              style="width:100%;padding:11px;font-size:14px;margin-top:4px;">
        Zaloguj się
      </button>
    </form>
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const errorEl = document.getElementById('error');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Logowanie…';

  try {
    const res = await fetch('/seo/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || 'Błąd logowania';
      errorEl.classList.add('show');
      form.classList.add('shake');
      setTimeout(() => form.classList.remove('shake'), 500);
    } else {
      window.location.href = '/seo/dashboard';
    }
  } catch {
    errorEl.textContent = 'Błąd połączenia z serwerem';
    errorEl.classList.add('show');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Zaloguj się';
  }
});
</script>
</body>
</html>
